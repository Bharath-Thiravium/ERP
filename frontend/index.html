<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Modern SAP System - Comprehensive Enterprise Resource Planning Solution" />
    <meta name="keywords" content="SAP, ERP, Enterprise, Resource Planning, Business Management" />
    <meta name="author" content="SAP System Team" />
    <title>SAP System - Modern Enterprise Solution</title>
    <!-- Preload critical resources -->
    <link rel="preload" href="/src/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="/src/styles/mobile-responsive.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/src/index.css"><link rel="stylesheet" href="/src/styles/mobile-responsive.css"></noscript>
    <style>
      /* Prevent FOUC - Enhanced with critical styles */
      #root { 
        visibility: hidden; 
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }
      #root.loaded { 
        visibility: visible; 
        opacity: 1;
      }
      
      /* Critical base styles to prevent major layout shifts */
      * {
        box-sizing: border-box;
      }
      
      body {
        background-color: #f9fafb;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #111827;
        line-height: 1.5;
      }
      
      /* Loading spinner */
      .loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 9999;
      }
      
      @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }
    </style>
    <script>
      (function () {
        try {
          var density = localStorage.getItem("app_density");
          if (!density) density = "compact";
          document.documentElement.setAttribute("data-density", density);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased">
    <div class="loading-spinner"></div>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.tsx" onerror="handleScriptError(event)"></script>
    <script>
      function handleScriptError(event) {
        console.error('Script loading failed:', event);
        document.body.innerHTML = '<div style="text-align:center;padding:50px;"><h2>Loading Error</h2><p>Please refresh the page or contact support.</p></div>';
      }
      
      // Remove loading spinner when app loads
      window.addEventListener('load', function() {
        const spinner = document.querySelector('.loading-spinner');
        const root = document.getElementById('root');
        if (spinner) spinner.style.display = 'none';
        if (root) root.classList.add('loaded');
      });
    </script>
  </body>
</html>
