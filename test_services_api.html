<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Services API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Services API</h1>
    
    <button onclick="testLogin()">1. Test Login</button>
    <button onclick="testServices()">2. Test Services API</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>

    <script>
        let accessToken = '';
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
            console.log(message);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testLogin() {
            try {
                log('🔍 Testing Master Admin Login...');
                
                const response = await fetch('http://127.0.0.1:8000/api/auth/master-admin/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'ilaiaraja@gmail.com',
                        password: 'Masteradmin@123'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    accessToken = data.access;
                    log(`✅ Login successful! Token: ${accessToken.substring(0, 50)}...`, 'success');
                } else {
                    const error = await response.text();
                    log(`❌ Login failed: ${response.status} - ${error}`, 'error');
                }
            } catch (error) {
                log(`❌ Login error: ${error.message}`, 'error');
            }
        }
        
        async function testServices() {
            if (!accessToken) {
                log('❌ Please login first!', 'error');
                return;
            }
            
            try {
                log('🔍 Testing Services API...');
                
                const response = await fetch('http://127.0.0.1:8000/api/auth/services/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json',
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ Services API successful!`, 'success');
                    log(`📊 Response structure: ${JSON.stringify(Object.keys(data))}`, 'success');
                    log(`📊 Services count: ${data.results ? data.results.length : 'No results field'}`, 'success');
                    
                    if (data.results && data.results.length > 0) {
                        log(`📋 First service: ${JSON.stringify(data.results[0], null, 2)}`, 'success');
                    }
                } else {
                    const error = await response.text();
                    log(`❌ Services API failed: ${response.status} - ${error}`, 'error');
                }
            } catch (error) {
                log(`❌ Services API error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
